<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dyski: Score in, music out</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage" id="stage">
        <div id="serialStatus" class="status-pill status-overlay">Disconnected</div>
        <div class="controls controls-overlay">
          <button id="connectBtn" type="button">Connect</button>
          <button id="disconnectBtn" type="button">Disconnect</button>
          <div class="source-wrapper">
            <button id="sourceBtn" type="button">Source <span class="chevron">&#x25BE;</span></button>
            <div id="sourcePanel" class="source-panel">
              <button id="uploadBtn" type="button">Image</button>
              <button id="screenBtn" type="button">Screen</button>
              <button id="cameraBtn" type="button">Camera</button>
              <div id="cameraList" class="camera-list"></div>
            </div>
          </div>
        </div>
        <button id="emptyUploadBtn" class="empty-upload-btn" type="button">Choose image</button>
        <p id="emptyUploadHint" class="empty-upload-hint">or drag an image onto this window</p>
        <canvas id="previewCanvas" aria-label="Uploaded image with viewfinder"></canvas>
        <div class="adjust-overlay">
          <button id="invertBtn" type="button">Invert</button>
          <div class="colors-wrapper">
            <button id="colorsBtn" type="button">Colors</button>
            <div id="colorsPanel" class="colors-panel" hidden>
              <div class="color-control">
                <label for="exposureSlider">Exposure</label>
                <input id="exposureSlider" type="range" min="-200" max="200" value="0" />
              </div>
              <div class="color-control">
                <label for="hueSlider">Hue</label>
                <input id="hueSlider" type="range" min="0" max="360" value="0" />
              </div>
              <div class="color-control">
                <label for="contrastSlider">Contrast</label>
                <input id="contrastSlider" type="range" min="-100" max="100" value="0" />
              </div>
              <button id="colorsResetBtn" type="button">Reset</button>
            </div>
          </div>
        </div>
        <div class="settings-overlay">
          <div class="settings-wrapper">
            <button id="settingsBtn" type="button">Settings</button>
            <div id="settingsPanel" class="settings-panel">
              <button id="followMouseBtn" class="settings-action" type="button">Mouse Mode: Off</button>
              <div class="color-control">
                <label for="slewSlider">Audio1 Slew</label>
                <input id="slewSlider" type="range" min="0" max="255" value="64" />
              </div>
              <div class="color-control">
                <label for="borderWeightSlider">Border Weight</label>
                <input id="borderWeightSlider" type="range" min="0" max="30" value="3" step="0.5" />
              </div>
              <div class="color-control">
                <label for="borderColorPicker">Border Color</label>
                <input id="borderColorPicker" type="color" value="#6ca6ff" />
              </div>
            </div>
          </div>
        </div>
      </section>

      <input id="imageInput" type="file" accept="image/*" hidden />
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
